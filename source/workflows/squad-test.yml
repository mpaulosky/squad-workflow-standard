name: Test Suite

# NOTE: All test projects now use 'dotnet test' consistently.
# This was updated to fix issues with direct executable execution that was
# causing "No such file or directory" errors in CI.

permissions:
  issues: write
  checks: write
  contents: read
  pull-requests: write

on:
  workflow_call:
    inputs:
      project_name:
        description: "Solution name without .slnx"
        required: false
        type: string
        default: "ProjectName"
  
  push:
    branches-ignore: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.squad/**'

  pull_request:
    branches-ignore: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.squad/**'

  workflow_dispatch:
    inputs:
      project_name:
        description: "Solution name without .slnx"
        required: false
        default: "ProjectName"
      reason:
        description: "The reason for running the workflow"
        required: true
        default: "Manual test run"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLUTION_NAME: ${{ inputs.project_name || 'ProjectName' }}.slnx
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

  # Aspire parameter bindings for E2E.Tests (Parameters:auth0MgmtClientId/Secret)
  Auth0__Domain: ${{ secrets.AUTH0_DOMAIN }}
  Auth0__ClientId: ${{ secrets.AUTH0_CLIENT_ID }}
  Auth0__ClientSecret: ${{ secrets.AUTH0_CLIENT_SECRET }}
  Auth0Management__ClientId: ${{ secrets.AUTH0_MANAGEMENT_CLIENT_ID }}
  Auth0Management__ClientSecret: ${{ secrets.AUTH0_MANAGEMENT_CLIENT_SECRET }}
  Auth0Management__Domain: ${{ secrets.AUTH0_DOMAIN }}
  Auth0Management__Audience: https://${{ secrets.AUTH0_DOMAIN }}/api/v2/
  Parameters__auth0MgmtClientId: ${{ secrets.AUTH0_MANAGEMENT_CLIENT_ID }}
  Parameters__auth0MgmtClientSecret: ${{ secrets.AUTH0_MANAGEMENT_CLIENT_SECRET }}
  #MongoDB__ConnectionString: ${{ secrets.MONGODB_CONNECTION_STRING }}

jobs:
  build:
    name: Build Solution
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_NAME }} --configuration Release --no-restore

      - name: Cache build artifacts
        uses: actions/cache@v6
        with:
          path: |
            **/bin/Release/
            **/obj/
          key: ${{ runner.os }}-build-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-build-


  test-domain:
    name: "Domain Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Run Domain Tests
        run: |
          dotnet test tests/Domain.Tests \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --logger "trx;LogFileName=domain.trx" \
            --results-directory test-results \
            --verbosity minimal

      - name: Upload Domain Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: domain-test-results
          path: test-results

  test-unit:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Run Unit Tests
        run: |
          dotnet test tests/Unit.Tests \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --logger "trx;LogFileName=Unit.trx" \
            --results-directory test-results \
            --verbosity minimal

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: Unit-test-results
          path: test-results

  test-architecture:
    name: "Architecture Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Architecture Tests
        run: dotnet build tests/Architecture.Tests --configuration Release --no-restore

      - name: Run Architecture Tests
        id: arch-tests
        run: |
          mkdir -p test-results
          if [ ! -d "tests/Architecture.Tests" ]; then
            echo "::notice::Architecture test project not found at tests/Architecture.Tests - skipping"
            exit 0
          fi

          # Run tests using dotnet test
          dotnet test tests/Architecture.Tests \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=architecture.trx" \
            --results-directory "$GITHUB_WORKSPACE/test-results" \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
          exit_code=$?

          if [ $exit_code -ne 0 ]; then
            echo "::error::Architecture tests failed"
          fi
          exit $exit_code

      - name: Upload Architecture Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: architecture-test-results
          path: test-results

  test-component:
    name: "Component Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Component Tests
        run: dotnet build tests/Component.Tests --configuration Release --no-restore

      - name: Run Component Tests
        id: component-tests
        run: |
          mkdir -p test-results
          if [ ! -d "tests/Component.Tests" ]; then
            echo "::notice::Component/Component test project not found at tests/Component.Tests - skipping"
            exit 0
          fi

          # Run tests using dotnet test
          dotnet test tests/Component.Tests \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=component.trx" \
            --results-directory "$GITHUB_WORKSPACE/test-results" \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
          exit_code=$?

          if [ $exit_code -ne 0 ]; then
            echo "::error::Component tests failed"
          fi
          exit $exit_code

      - name: Upload Component Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: component-test-results
          path: test-results

  test-e2e:
    name: "E2E Tests (Aspire + Playwright E2E)"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: build

    env:
      ASPIRE_ALLOW_UNSECURED_TRANSPORT: "true"
      # Required by E2E builder.AddConnectionString("mongodb") even though
      # the Unit app ignores it in Testing mode (no real DB connection is made).
      # ConnectionStrings__mongodb: "mongodb://localhost:27017"

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build E2E Tests
        run: dotnet build tests/E2E.Tests --configuration Release --no-restore

      - name: Install Playwright browsers
        run: |
          pwsh tests/E2E.Tests/bin/Release/net10.0/playwright.ps1 install chromium --with-deps

      - name: Run E2E Tests
        id: e2e-tests
        run: |
          mkdir -p test-results
          dotnet test tests/E2E.Tests \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=e2e.trx" \
            --results-directory "$GITHUB_WORKSPACE/test-results" \
            --collect:"XPlat Code Coverage"
          exit_code=$?
          if [ $exit_code -ne 0 ]; then
            echo "::error::E2E Tests failed"
          fi
          exit $exit_code

      - name: Upload E2E Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-test-results
          path: test-results

  coverage:
    name: Coverage Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - test-domain
      - test-unit
      - test-architecture
      - test-component
      - test-e2e
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Download coverage reports
        uses: actions/download-artifact@v8
        with:
          path: coverage-reports

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:"coverage-reports/**/**/coverage.cobertura.xml" \
            -targetdir:"./coverage-output" \
            -reporttypes:"Html;Cobertura;JsonSummary" \
            -filefilters:"-**/obj/**/*.cs;-**/*.generated.cs" \
            -verbosity:verbose || echo "::warning::No coverage files found"

      - name: Check coverage threshold
        run: |
          if [ -f "./coverage-output/Summary.json" ]; then
            echo "=== Summary.json raw ===" && cat ./coverage-output/Summary.json | jq . || true
            coverage=$(jq -r '.summary.linecoverage // .lineCoverage // 0' ./coverage-output/Summary.json 2>/dev/null || echo "0")
            echo "Line Coverage: $coverage%"
            if (( $(echo "$coverage < 80" | bc -l) )); then
              echo "::error::Code coverage is below 80% threshold: $coverage% (required: 80%)"
              exit 1
            else
              echo "::notice::Coverage gate passed: $coverage% >= 80%"
            fi
          else
            echo "::warning::Coverage report not available — skipping threshold check"
          fi

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-reports
          path: coverage-output

      - name: Publish to Codecov
        uses: codecov/codecov-action@v7
        if: always()
        with:
          fail_ci_if_error: false
          files: ./coverage-output/Cobertura.xml
          verbose: false

  report:
    name: Test Report Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build
      - test-domain
      - test-unit
      - test-architecture
      - test-component
      - test-e2e
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download all test results
        uses: actions/download-artifact@v8
        with:
          path: all-test-results

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2.24.0
        if: always()
        with:
          files: |
            all-test-results/**/*.trx
            all-test-results/**/*-nunit.xml
          check_name: Test Results Summary
          compare_to_earlier_commit: true

      - name: Generate job summary
        if: always()
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Build:** ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Domain.Tests:** ${{ needs.test-domain.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Unit.Tests:** ${{ needs.test-unit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Architecture.Tests:** ${{ needs.test-architecture.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Component.Tests:** ${{ needs.test-component.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **E2E.Tests (Aspire + Playwright E2E):** ${{ needs.test-e2e.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Test results and coverage reports available in Actions artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage report: \`coverage-reports\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Set overall status
          build_status="${{ needs.build.result }}"
          domain_status="${{ needs.test-domain.result }}"
          unit_status="${{ needs.test-unit.result }}"
          arch_status="${{ needs.test-architecture.result }}"
          component_status="${{ needs.test-component.result }}"

          e2e_status="${{ needs.test-e2e.result }}"

          if [[ "$build_status" == "failure" || "$domain_status" == "failure" || "$unit_status" == "failure" || \
                "$arch_status" == "failure" || "$component_status" == "failure" || \
                "$e2e_status" == "failure" ]]; then
            echo "❌ **Overall Status:** FAILED" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Overall Status:** PASSED" >> $GITHUB_STEP_SUMMARY
          fi

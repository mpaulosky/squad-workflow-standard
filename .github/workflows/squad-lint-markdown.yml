name: Lint Markdown
# Runs markdownlint-cli2 using the repo's .markdownlint.json config

on:
  workflow_dispatch:
  push:
    branches: [dev, preview, main, insider, "squad/**"]
  pull_request:
    branches: [dev, preview, main, insider]

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Run markdownlint on changed Markdown files
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            files=$(git diff --name-only "origin/${{ github.base_ref }}..HEAD" -- '*.md')
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            files=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- '*.md')
          else
            git fetch origin main --depth=1
            files=$(git diff --name-only "origin/main..HEAD" -- '*.md')
          fi

          files=$(echo "$files" | grep -Ev '^(\.squad/|\.copilot/|\.github/agents/|\.github/skills/|\.github/copilot-instructions\.md$)' || true)

          if [[ -z "$files" ]]; then
            echo "No markdown files to lint."
            exit 0
          fi

          echo "$files"
          npx --yes markdownlint-cli2 $files

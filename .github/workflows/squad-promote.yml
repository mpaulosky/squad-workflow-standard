---

name: Squad Promote

"on":
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — show what would happen without pushing'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

env:
  DEV_BRANCH: ${{ vars.SQUAD_DEV_BRANCH || 'dev' }}
  PREVIEW_BRANCH: ${{ vars.SQUAD_PREVIEW_BRANCH || 'preview' }}
  MAIN_BRANCH: ${{ vars.SQUAD_MAIN_BRANCH || github.event.repository.default_branch || 'main' }}

jobs:
  dev-to-preview:
    name: Promote dev → preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: git fetch --all

      - name: Show current state (dry run info)
        run: |
          echo "=== ${DEV_BRANCH} HEAD ===" && git log "origin/${DEV_BRANCH}" -1 --oneline
          echo "=== ${PREVIEW_BRANCH} HEAD ===" && git log "origin/${PREVIEW_BRANCH}" -1 --oneline
          echo "=== Files that would be stripped ==="
          git diff "origin/${PREVIEW_BRANCH}..origin/${DEV_BRANCH}" --name-only | grep -E "^(\.(ai-team|squad|ai-team-templates|squad-templates)|team-docs/|docs/proposals/)" || echo "(none)"

      - name: Merge dev → preview (strip forbidden paths)
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          git checkout "${PREVIEW_BRANCH}"
          git merge "origin/${DEV_BRANCH}" --no-commit --no-ff -X theirs || true

          # Strip forbidden paths from merge commit
          git rm -rf --cached --ignore-unmatch \
            .ai-team/ \
            .squad/ \
            .ai-team-templates/ \
            .squad-templates/ \
            team-docs/ \
            "docs/proposals/" || true

          # Commit if there are staged changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: promote ${DEV_BRANCH} → ${PREVIEW_BRANCH} (v$(node -e "console.log(require('./package.json').version)"))"
            git push origin "${PREVIEW_BRANCH}"
            echo "✅ Pushed ${PREVIEW_BRANCH} branch"
          else
            echo "ℹ️ Nothing to commit — ${PREVIEW_BRANCH} is already up to date"
          fi

      - name: Dry run complete
        if: ${{ inputs.dry_run == 'true' }}
        run: echo "🔍 Dry run complete — no changes pushed."

  preview-to-main:
    name: Promote preview → main (release)
    needs: dev-to-preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: git fetch --all

      - name: Show current state
        run: |
          echo "=== ${PREVIEW_BRANCH} HEAD ===" && git log "origin/${PREVIEW_BRANCH}" -1 --oneline
          echo "=== ${MAIN_BRANCH} HEAD ===" && git log "origin/${MAIN_BRANCH}" -1 --oneline
          echo "=== Version ===" && node -e "console.log('v' + require('./package.json').version)"

      - name: Validate preview is release-ready
        run: |
          git checkout "${PREVIEW_BRANCH}"
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md 2>/dev/null; then
            echo "::error::Version $VERSION not found in CHANGELOG.md — update before releasing"
            exit 1
          fi
          echo "✅ Version $VERSION has CHANGELOG entry"

          # Verify no forbidden files on preview
          FORBIDDEN=$(git ls-files | grep -E "^(\.(ai-team|squad|ai-team-templates|squad-templates)/|team-docs/|docs/proposals/)" || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "::error::Forbidden files found on ${PREVIEW_BRANCH}: $FORBIDDEN"
            exit 1
          fi
          echo "✅ No forbidden files on ${PREVIEW_BRANCH}"

      - name: Merge preview → main
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          git checkout "${MAIN_BRANCH}"
          git merge "origin/${PREVIEW_BRANCH}" --no-ff -m "chore: promote ${PREVIEW_BRANCH} → ${MAIN_BRANCH} (v$(node -e "console.log(require('./package.json').version)"))"
          git push origin "${MAIN_BRANCH}"
          echo "✅ Pushed ${MAIN_BRANCH} — squad-release.yml will tag and publish the release"

      - name: Dry run complete
        if: ${{ inputs.dry_run == 'true' }}
        run: echo "🔍 Dry run complete — no changes pushed."

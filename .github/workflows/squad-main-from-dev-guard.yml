name: guard-main-source

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  guard-main-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            if (context.eventName !== "pull_request") {
              core.info("Not a pull_request event.");
              return;
            }
            const source = context.payload.pull_request.head.ref;
            const isAllowed =
              source === "dev" ||
              source.startsWith("hotfix/");
            if (!isAllowed) {
              core.setFailed(
                `PRs to main must come from dev, or hotfix/*. Current source: ${source}`
              );
            }

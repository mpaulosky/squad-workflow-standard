# yamllint disable rule:line-length
---
name: Squad Paths Guard

"on":
  pull_request:
    branches: ["**"]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

env:
  DEV_BRANCH: ${{ vars.SQUAD_DEV_BRANCH || 'dev' }}
  PREVIEW_BRANCH: ${{ vars.SQUAD_PREVIEW_BRANCH || 'preview' }}
  MAIN_BRANCH: ${{ vars.SQUAD_MAIN_BRANCH || github.event.repository.default_branch || 'main' }}

jobs:
  guard-main-paths:
    name: guard-main-paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check for forbidden paths
        uses: actions/github-script@v9
        with:
          script: |
            const baseBranch = context.payload.pull_request.base.ref;
            const mainBranch = process.env.MAIN_BRANCH;
            const devBranch = process.env.DEV_BRANCH;

            if (baseBranch !== mainBranch && baseBranch !== devBranch) {
              core.info(`Skipping path guard for PR to ${baseBranch}; guard only applies to ${mainBranch} and ${devBranch}.`);
              return;
            }

            // Fetch all files changed in this PR (paginated)
            const files = [];
            let page = 1;
            while (true) {
              const resp = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
                page
              });
              files.push(...resp.data);
              if (resp.data.length < 100) break;
              page++;
            }

            // Check each file against branch-specific forbidden path rules.
            const forbidden = files
              .filter(f => {
                const filename = f.filename;

                if (baseBranch === mainBranch) {
                  // main: block new or modified .squad/ and team-docs/ paths, but allow removals.
                  return f.status !== 'removed' && (
                    filename === '.squad' ||
                    filename.startsWith('.squad/') ||
                    filename.startsWith('team-docs/')
                  );
                }

                if (baseBranch === devBranch) {
                  // dev: keep .squad/ retained by blocking removals only.
                  return f.status === 'removed' && (
                    filename === '.squad' ||
                    filename.startsWith('.squad/')
                  );
                }

                return false;
              })
              .map(f => f.filename);

            if (forbidden.length === 0) {
              core.info(`✅ No forbidden paths found in PR to ${baseBranch} — all clear.`);
              return;
            }

            // Build a clear, actionable error message
            const remediationLines = baseBranch === mainBranch
              ? [
                  '```bash',
                  '# Remove tracked .squad/ files (keeps local copies):',
                  'git rm --cached -r .squad/',
                  '',
                  '# Remove tracked team-docs/ files:',
                  'git rm --cached -r team-docs/',
                  '',
                  '# Commit the removal and push:',
                  'git commit -m "chore: remove forbidden paths from PR"',
                  'git push',
                  '```',
                  '',
                  `> ⚠️ \`.squad/\` is committed on \`${devBranch}\` and feature branches by design.`,
                  `> The guard workflow is the enforcement mechanism that keeps these files off \`${mainBranch}\`.`,
                  '> `git rm --cached` untracks them from this PR without deleting your local copies.',
                ]
              : [
                  '```bash',
                  `# Restore removed .squad/ files before merging to ${devBranch}:`,
                  'git checkout -- .squad/',
                  '```',
                  '',
                  `> ⚠️ \`${devBranch}\` must retain \`.squad/\` so the branch keeps team state.`,
                  '> Restore any removed `.squad/` files before merging this PR.',
                ];

            const lines = [
              `## 🚫 Forbidden files detected in PR to ${baseBranch}`,
              '',
              baseBranch === mainBranch
                ? `The following files must NOT be merged into \`${mainBranch}\`.`
                : `The following \`.squad/\` files must NOT be removed from \`${devBranch}\`.`,
              baseBranch === mainBranch
                ? `\`.squad/\` is runtime team state — it belongs on \`${devBranch}\` branches only.`
                : `\`.squad/\` must remain present on \`${devBranch}\` so the branch retains team state.`,
              baseBranch === mainBranch
                ? `\`team-docs/\` is internal team content — it belongs on \`${devBranch}\` branches only.`
                : `\`team-docs/\` is not restricted by this guard on \`${devBranch}\`.`,
              '',
              '### Forbidden files found:',
              '',
              ...forbidden.map(f => `- \`${f}\``),
              '',
              '### How to fix:',
              '',
              ...remediationLines,
            ];

            core.setFailed(lines.join('\n'));

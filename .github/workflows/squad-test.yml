name: Test Suite

# NOTE: All test projects now use 'dotnet test' consistently.
# This was updated to fix issues with direct executable execution that was
# causing "No such file or directory" errors in CI.

permissions:
  issues: write
  checks: write
  contents: read
  pull-requests: write

on:
  workflow_call:
    inputs:
      project_name:
        description: "Solution name without .slnx"
        required: false
        type: string
        default: "ProjectName"
  
  push:
    branches-ignore: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.squad/**'

  pull_request:
    branches-ignore: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.squad/**'

  workflow_dispatch:
    inputs:
      project_name:
        description: "Solution name without .slnx"
        required: false
        default: "ProjectName"
      reason:
        description: "The reason for running the workflow"
        required: true
        default: "Manual test run"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLUTION_NAME: ${{ inputs.project_name || 'ProjectName' }}.slnx
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Build Solution
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_NAME }} --configuration Release --no-restore

      - name: Cache build artifacts
        uses: actions/cache@v6
        with:
          path: |
            **/bin/Release/
            **/obj/
          key: ${{ runner.os }}-build-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-build-


  test-squadWorkflowStandard:
    name: "Standard Workflow Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Run SquadWorkflowStandard Tests
        run: |
          dotnet test tests/SquadWorkflowStandard.Tests \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --logger "trx;LogFileName=squadWorkflowStandard.trx" \
            --results-directory test-results \
            --verbosity minimal

      - name: Upload SquadWorkflowStandard Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: squadWorkflowStandard-test-results
          path: test-results

  coverage:
    name: Coverage Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - test-squadWorkflowStandard
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Download coverage reports
        uses: actions/download-artifact@v8
        with:
          path: coverage-reports

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:"coverage-reports/**/**/coverage.cobertura.xml" \
            -targetdir:"./coverage-output" \
            -reporttypes:"Html;Cobertura;JsonSummary" \
            -filefilters:"-**/obj/**/*.cs;-**/*.generated.cs" \
            -verbosity:verbose || echo "::warning::No coverage files found"

      - name: Check coverage threshold
        run: |
          if [ -f "./coverage-output/Summary.json" ]; then
            echo "=== Summary.json raw ===" && cat ./coverage-output/Summary.json | jq . || true
            coverage=$(jq -r '.summary.linecoverage // .lineCoverage // 0' ./coverage-output/Summary.json 2>/dev/null || echo "0")
            echo "Line Coverage: $coverage%"
            if (( $(echo "$coverage < 80" | bc -l) )); then
              echo "::error::Code coverage is below 80% threshold: $coverage% (required: 80%)"
              exit 1
            else
              echo "::notice::Coverage gate passed: $coverage% >= 80%"
            fi
          else
            echo "::warning::Coverage report not available — skipping threshold check"
          fi

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-reports
          path: coverage-output

      - name: Publish to Codecov
        uses: codecov/codecov-action@v7
        if: always()
        with:
          fail_ci_if_error: false
          files: ./coverage-output/Cobertura.xml
          verbose: false

  report:
    name: Test Report Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build
      - test-squadWorkflowStandard
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download all test results
        uses: actions/download-artifact@v8
        with:
          path: all-test-results

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2.24.0
        if: always()
        with:
          files: |
            all-test-results/**/*.trx
            all-test-results/**/*-nunit.xml
          check_name: Test Results Summary
          compare_to_earlier_commit: true

      - name: Generate job summary
        if: always()
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Build:** ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SquadWorkflowStandard.Tests:** ${{ needs.test-squadWorkflowStandard.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Test results and coverage reports available in Actions artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage report: \`coverage-reports\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Set overall status
          build_status="${{ needs.build.result }}"
          squadWorkflowStandard_status="${{ needs.test-squadWorkflowStandard.result }}"

          if [[ "$build_status" == "failure" || "$squadWorkflowStandard_status" == "failure" ]]; then
          else
            echo "❌ **Overall Status:** FAILED" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Overall Status:** PASSED" >> $GITHUB_STEP_SUMMARY
          fi

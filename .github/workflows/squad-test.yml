name: Test Suite

permissions:
  issues: write
  checks: write
  contents: read
  pull-requests: write

on:
  workflow_call:
    inputs:
      project_name:
        description: "Solution name without .slnx"
        required: false
        type: string
        default: "squad-workflow-standard"

  push:
    branches-ignore: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.squad/**'

  pull_request:
    branches-ignore: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.squad/**'

  workflow_dispatch:
    inputs:
      project_name:
        description: "Solution name without .slnx"
        required: false
        default: "squad-workflow-standard"
      reason:
        description: "The reason for running the workflow"
        required: true
        default: "Manual test run"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLUTION_NAME: ${{ inputs.project_name || 'squad-workflow-standard' }}.slnx
  TEST_PROJECT: tests/SquadWorkflowStandard.Tests/SquadWorkflowStandard.Tests.csproj
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Build Solution
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore "${{ env.SOLUTION_NAME }}"

      - name: Build solution
        run: dotnet build "${{ env.SOLUTION_NAME }}" --configuration Release --no-restore

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore "${{ env.SOLUTION_NAME }}"

      - name: Run Unit Tests
        run: |
          dotnet test "${{ env.TEST_PROJECT }}" \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --logger "trx;LogFileName=unit.trx" \
            --results-directory test-results \
            --verbosity minimal

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unit-test-results
          path: test-results

  report:
    name: Test Report Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build
      - test-unit
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download all test results
        uses: actions/download-artifact@v8
        with:
          path: all-test-results

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2.24.0
        if: always()
        with:
          files: all-test-results/**/*.trx
          check_name: Test Results Summary
          compare_to_earlier_commit: true

      - name: Generate job summary
        if: always()
        run: |
          echo "## Test Execution Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Build:** ${{ needs.build.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Unit.Tests:** ${{ needs.test-unit.result }}" >> "$GITHUB_STEP_SUMMARY"

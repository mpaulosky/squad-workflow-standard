name: Test Suite

# NOTE: All test projects now use 'dotnet test' consistently.
# This was updated to fix issues with direct executable execution that was
# causing "No such file or directory" errors in CI.

permissions:
  issues: write
  checks: write
  contents: read
  pull-requests: write

on:
  workflow_call:
    inputs:
      project_name:
        description: "Solution name without .slnx"
        required: false
        type: string
        default: ""
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      project_name:
        description: "Solution name without .slnx"
        required: false
        default: ""
      reason:
        description: "The reason for running the workflow"
        required: true
        default: "Manual test run"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLUTION_NAME: ${{ inputs.project_name || github.event.repository.name }}.slnx
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

  # Aspire parameter bindings for E2E.Tests (Parameters:auth0MgmtClientId/Secret)
  Auth0__Domain: ${{ secrets.AUTH0_DOMAIN }}
  Auth0__ClientId: ${{ secrets.AUTH0_CLIENT_ID }}
  Auth0__ClientSecret: ${{ secrets.AUTH0_CLIENT_SECRET }}
  Auth0Management__ClientId: ${{ secrets.AUTH0_MANAGEMENT_CLIENT_ID }}
  Auth0Management__ClientSecret: ${{ secrets.AUTH0_MANAGEMENT_CLIENT_SECRET }}
  Auth0Management__Domain: ${{ secrets.AUTH0_DOMAIN }}
  Auth0Management__Audience: https://${{ secrets.AUTH0_DOMAIN }}/api/v2/
  Parameters__auth0MgmtClientId: ${{ secrets.AUTH0_MANAGEMENT_CLIENT_ID }}
  Parameters__auth0MgmtClientSecret: ${{ secrets.AUTH0_MANAGEMENT_CLIENT_SECRET }}
  #MongoDB__ConnectionString: ${{ secrets.MONGODB_CONNECTION_STRING }}

jobs:
  build:
    name: Build Solution
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_NAME }} --configuration Release --no-restore

      - name: Cache build artifacts
        uses: actions/cache@v6
        with:
          path: |
            **/bin/Release/
            **/obj/
          key: ${{ runner.os }}-build-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-build-


  discover-tests:
    name: Discover Test Projects
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Discover test projects
        id: discover
        run: |
          matrix_json=$(python - <<'PY'
          import json
          from pathlib import Path

          projects = []
          for csproj in sorted(Path("tests").glob("**/*.csproj")):
              folder = csproj.parent.name
              lowered = folder.lower()
              test_id = lowered.replace(".", "-").replace("_", "-")
              is_e2e = "e2e" in lowered
              projects.append(
                  {
                      "project_path": csproj.as_posix(),
                      "test_name": folder,
                      "test_id": test_id,
                      "build_before_test": is_e2e,
                      "no_build": is_e2e,
                      "requires_playwright": is_e2e,
                      "verbosity": "normal" if is_e2e else "minimal",
                  }
              )

          if not projects:
              raise SystemExit("No test projects found under tests/.")

          print(json.dumps({"include": projects}))
          PY
          )

          {
            echo "matrix<<EOF"
            echo "$matrix_json"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          project_count=$(echo "$matrix_json" | jq '.include | length')
          echo "::notice::Discovered ${project_count} test projects under tests/"

  test:
    name: "Tests: ${{ matrix.test_name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - build
      - discover-tests
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-tests.outputs.matrix) }}

    env:
      ASPIRE_ALLOW_UNSECURED_TRANSPORT: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build test project
        if: ${{ matrix.build_before_test }}
        run: dotnet build "${{ matrix.project_path }}" --configuration Release --no-restore

      - name: Install Playwright browsers
        if: ${{ matrix.requires_playwright }}
        run: |
          project_dir="$(dirname "${{ matrix.project_path }}")"
          playwright_script=$(find "$project_dir/bin/Release" -type f -name "playwright.ps1" | head -n 1)
          if [ -z "$playwright_script" ]; then
            echo "::error::Unable to locate playwright.ps1 for ${{ matrix.project_path }}"
            exit 1
          fi
          pwsh "$playwright_script" install chromium --with-deps

      - name: Run tests
        id: run-tests
        run: |
          mkdir -p test-results

          no_build_arg=""
          if [ "${{ matrix.no_build }}" = "true" ]; then
            no_build_arg="--no-build"
          fi

          dotnet test "${{ matrix.project_path }}" \
            --configuration Release \
            $no_build_arg \
            --verbosity "${{ matrix.verbosity }}" \
            --logger "trx;LogFileName=${{ matrix.test_id }}.trx" \
            --results-directory "$GITHUB_WORKSPACE/test-results" \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
          exit_code=$?
          if [ $exit_code -ne 0 ]; then
            echo "::error::Test project failed: ${{ matrix.project_path }}"
          fi
          exit $exit_code

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.test_id }}
          path: test-results

  coverage:
    name: Coverage Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - test
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Download coverage reports
        uses: actions/download-artifact@v8
        with:
          path: coverage-reports

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:"coverage-reports/**/**/coverage.cobertura.xml" \
            -targetdir:"./coverage-output" \
            -reporttypes:"Html;Cobertura;JsonSummary" \
            -filefilters:"-**/obj/**/*.cs;-**/*.generated.cs" \
            -verbosity:verbose || echo "::warning::No coverage files found"

      - name: Check coverage threshold
        run: |
          if [ -f "./coverage-output/Summary.json" ]; then
            echo "=== Summary.json raw ===" && cat ./coverage-output/Summary.json | jq . || true
            coverable_lines=$(jq -r '.summary.coverablelines // .summary.coverableLines // .coverablelines // .coverableLines // 0' ./coverage-output/Summary.json 2>/dev/null || echo "0")
            coverage=$(jq -r '.summary.linecoverage // .lineCoverage // 0' ./coverage-output/Summary.json 2>/dev/null || echo "0")
            echo "Line Coverage: $coverage%"
            if [ "$coverable_lines" = "0" ]; then
              echo "::warning::No coverable lines found in Summary.json — skipping threshold check"
            else
              if (( $(echo "$coverage < 80" | bc -l) )); then
                echo "::error::Code coverage is below 80% threshold: $coverage% (required: 80%)"
                exit 1
              else
                echo "::notice::Coverage gate passed: $coverage% >= 80%"
              fi
            fi
          else
            echo "::warning::Coverage report not available — skipping threshold check"
          fi

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-reports
          path: coverage-output

      - name: Publish to Codecov
        uses: codecov/codecov-action@v7
        if: always()
        with:
          fail_ci_if_error: false
          files: ./coverage-output/Cobertura.xml
          verbose: false

  report:
    name: Test Report Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build
      - discover-tests
      - test
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download all test results
        uses: actions/download-artifact@v8
        with:
          path: all-test-results

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2.24.0
        if: always()
        with:
          files: |
            all-test-results/**/*.trx
            all-test-results/**/*-nunit.xml
          check_name: Test Results Summary
          compare_to_earlier_commit: true

      - name: Generate job summary
        if: always()
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Build:** ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Discovered Tests:** ${{ needs.discover-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Matrix:** ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Test results and coverage reports available in Actions artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage report: \`coverage-reports\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Discovered Test Projects" >> $GITHUB_STEP_SUMMARY
          echo '${{ needs.discover-tests.outputs.matrix }}' | jq -r '.include[].project_path | "- " + .' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Set overall status
          build_status="${{ needs.build.result }}"
          discover_status="${{ needs.discover-tests.result }}"
          test_status="${{ needs.test.result }}"

          if [[ "$build_status" == "failure" || "$discover_status" == "failure" || "$test_status" == "failure" ]]; then
            echo "❌ **Overall Status:** FAILED" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Overall Status:** PASSED" >> $GITHUB_STEP_SUMMARY
          fi

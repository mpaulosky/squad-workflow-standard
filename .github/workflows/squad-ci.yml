---
name: Squad CI
# Fast restore/build gate for feature branches and PRs into protected main.

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".squad/**"
  push:
    branches-ignore: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".squad/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Squad CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Discover solution file
        run: |
          mapfile -t matches < <(find . -maxdepth 1 -name '*.slnx')
          count=${#matches[@]}
          if [[ $count -eq 0 ]]; then
            echo "::error::No *.slnx file found at the repository root."
            exit 1
          elif [[ $count -gt 1 ]]; then
            echo "::error::Multiple *.slnx files found"
            echo "::error::${matches[*]}"
            exit 1
          fi
          echo "SOLUTION_FILE=${matches[0]}" >> "$GITHUB_ENV"
          echo "Discovered solution: ${matches[0]}"

      - name: Restore dependencies
        run: dotnet restore "$SOLUTION_FILE"

      - name: Build solution
        run: dotnet build "$SOLUTION_FILE" --configuration Release --no-restore

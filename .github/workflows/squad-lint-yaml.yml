name: Lint YAML
# Validates all workflow and config YAML files

on:
  workflow_dispatch:
  push:
    branches: [dev, preview, main, insider, "squad/**"]
  pull_request:
    branches: [dev, preview, main, insider]

permissions:
  contents: read

jobs:
  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_data: |
            extends: default
            ignore: |
              .squad/
            rules:
              line-length:
                max: 200
                allow-non-breakable-inline-mappings: true
              truthy:
                allowed-values: ['true', 'false', 'on']
              brackets:
                min-spaces-inside: 0
                max-spaces-inside: 1

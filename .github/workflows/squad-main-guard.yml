---
name: guard-main-source

'on':
  pull_request:
    branches: [main]
  workflow_dispatch:
    types: [ opened, synchronize, reopened, ready_for_review ]

jobs:
  guard-main-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            if (context.eventName !== "pull_request") {
              core.info("Not a pull_request event.");
              return;
            }

            const source = context.payload.pull_request.head.ref;
            const isValid = source === "dev"  || source.startsWith("squad/") || source.startsWith("hotfix/");
            if (!isValid) {
              core.setFailed(
                `PRs to main must come from dev or hotfix/* branches. Current source: ${source}`
              );
            }

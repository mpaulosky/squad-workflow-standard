name: Squad Release
# Keeps the current main-push release flow, but validates the real solution first.

"on":
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".squad/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.7.0
        with:
          versionSpec: "6.x"

      - name: Use GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.7.0

      - name: Set version outputs
        id: version
        run: |
          VERSION=${{ steps.gitversion.outputs.fullSemVer }}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION (tag: v$VERSION)"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ Tag ${{ steps.version.outputs.tag }} already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "🆕 Tag ${{ steps.version.outputs.tag }} does not exist — creating release."
          fi

      - name: Discover solution file
        run: |
          mapfile -t matches < <(find . -maxdepth 1 -name '*.slnx')
          count=${#matches[@]}
          if [[ $count -eq 0 ]]; then
            echo "::error::No *.slnx file found at the repository root."
            exit 1
          elif [[ $count -gt 1 ]]; then
            echo "::error::Multiple *.slnx files found at the repository root: ${matches[*]}"
            exit 1
          fi
          echo "SOLUTION_FILE=${matches[0]}" >> "$GITHUB_ENV"
          echo "Discovered solution: ${matches[0]}"

      - name: Restore dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: dotnet restore "$SOLUTION_FILE"

      - name: Build solution
        if: steps.check_tag.outputs.exists == 'false'
        run: dotnet build "$SOLUTION_FILE" --configuration Release --no-restore

      - name: Run fast release validation tests
        if: steps.check_tag.outputs.exists == 'false'
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t projects < <(find tests -type f -name '*.csproj' | sort)
          if [[ ${#projects[@]} -eq 0 ]]; then
            echo "::error::No test projects (*.csproj) found under tests/."
            exit 1
          fi

          for project in "${projects[@]}"; do
            echo "=== Running ${project} ==="
            dotnet test "$project" \
              --configuration Release \
              --no-build \
              --no-restore \
              --verbosity minimal
          done

      - name: Create git tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --latest

      - name: Verify release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ steps.version.outputs.tag }}"
          echo "✅ Release ${{ steps.version.outputs.tag }} created and verified."
